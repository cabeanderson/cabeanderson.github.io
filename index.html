<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Slippery Elm Woodworks - Premium handcrafted woodwork and fine craftsmanship coming soon.">
    <title>Slippery Elm Woodworks</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M15,85 C20,70 30,50 85,15 C75,35 65,70 35,80 Z' fill='%231b4332'/><path d='M12,88 C18,82 32,60 55,42 C56,43 55,44 54,45 C32,62 19,84 14,90 Z' fill='%23000000'/><path d='M35,80 L32,74 L40,73 L38,66 L47,66 L44,58 L54,59 L51,51 L61,53 L58,45 L68,47 L65,39 L74,42 L72,34 L80,37 L78,28 L85,15 C78,23 70,27 72,31 L64,28 L66,36 L58,33 L60,42 L51,38 L53,48 L44,44 L46,54 L38,50 L39,60 L31,56 L32,66 L25,62 L26,71 Z' fill='%231b4332'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus+SC&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-image: url('bg-tile3.png');
            background-repeat: repeat;
            background-position: top left;
            
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px; 
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-family: 'Marcellus SC', serif;
            /* clamp() smoothly scales text between 2rem on mobile and 3.5rem on large screens */
            font-size: clamp(2rem, 6vw, 3.5rem); 
            font-weight: 400;
            color: #222222;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            line-height: 1.3;
            
            /* Start invisible, then run the fadeIn animation */
            opacity: 0;
            animation: fadeIn 2s ease-in-out forwards;
        }

        p {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: clamp(1rem, 3vw, 1.25rem);
            font-weight: 400;
            color: #666666;
            letter-spacing: 0.03em;
            text-transform: lowercase;
            
            /* inline-block is required so the typing animation hugs the text edges perfectly */
            display: inline-block; 
            
            /* Start invisible. Wait 2s, then run the typeReveal animation over 1.5s */
            opacity: 0;
            animation: typeReveal 1.5s steps(23, end) 2s forwards;
        }

        /* --- Animations --- */
        
        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: translateY(10px); /* Adds a subtle upward float as it fades in */
            } 
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        @keyframes typeReveal {
            0% { 
                /* Hide text by clipping 100% of it from the right */
                clip-path: inset(0 100% 0 0); 
                opacity: 1; 
            }
            100% { 
                /* Reveal text entirely */
                clip-path: inset(0 0 0 0); 
                opacity: 1; 
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Slippery Elm Woodworks</h1>
        <p>new website coming soon</p>
    </div>

</body>
</html>
